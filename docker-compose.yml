version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: featurevote-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: featurevote
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

  backend:
    build: .
    container_name: featurevote-bff
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/featurevote
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

